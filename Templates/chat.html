<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/styles/style.css">
    <title>TomberS — Chat</title>
    <style>
        .chat-layout {
            display: flex;
            height: calc(100vh - 160px);
            max-width: 860px;
            width: 90%;
            margin: 140px auto 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .matches-list {
            width: 280px;
            min-width: 280px;
            border-right: 1px solid rgba(255,255,255,0.12);
            overflow-y: auto;
            background: #613A67;
            color: #D4BDE8;
        }

        .matches-list h3 {
            padding: 20px;
            font-size: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            margin: 0;
            color: #fff;
        }

        .match-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .match-item:hover, .match-item.active {
            background: rgba(194,123,255,0.25);
        }

        .match-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .match-info { overflow: hidden; }
        .match-name { font-weight: 600; font-size: 0.95rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .match-project { font-size: 0.78rem; color: #D4BDE8; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #4a2c50;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: #5a3560;
        }

        .chat-header h3 { margin: 0; font-size: 1rem; color: #fff; font-weight: 700; }
        .chat-header p  { margin: 2px 0 0; font-size: 0.8rem; color: #D4BDE8; opacity: 0.8; }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: rgba(255,255,255,0.12);
            color: #D4BDE8;
            border-bottom-left-radius: 4px;
        }

        .message .msg-sender { font-size: 0.75rem; color: #C27BFF; margin-bottom: 4px; font-weight: 600; }
        .message .msg-time   { font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-top: 4px; text-align: right; }

        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 10px;
            background: #5a3560;
        }

        .chat-input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }

        .chat-input::placeholder { color: rgba(255,255,255,0.4); }
        .chat-input:focus { border-color: #C27BFF; }

        .send-btn {
            padding: 10px 20px;
            border-radius: 24px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .send-btn:hover { opacity: 0.9; }

        .chat-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0.4;
            gap: 12px;
        }

        .chat-placeholder .icon { font-size: 3rem; }

        .no-matches {
            padding: 40px 20px;
            text-align: center;
            opacity: 0.5;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .chat-layout { flex-direction: column; margin-top: 60px; height: calc(100vh - 60px); }
            .matches-list { width: 100%; min-width: unset; max-height: 180px; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <a href="{{ url_for('feed') }}">
            <img src="/static/imagenes/logoTomberS.png" alt="Logo TomberS" class="logo-img">
        </a>
    </div>

    <div class="chat-layout">
        <!-- Lista de matches -->
        <div class="matches-list">
            <h3>💬 Mis Matches</h3>
            <div id="matches-container">
                <div class="no-matches">Cargando...</div>
            </div>
        </div>

        <!-- Área de chat -->
        <div class="chat-area" id="chat-area">
            <div class="chat-placeholder">
                <div class="icon">💬</div>
                <p>Seleccioná un match para chatear</p>
            </div>
        </div>
    </div>

    <script src="/static/scripts/chat.js"></script>
</body>
</html>
